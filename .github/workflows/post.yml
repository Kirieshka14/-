name: Post news to Telegram

on:
  schedule:
    - cron: "*/30 * * * *"   # каждые 30 минут
  workflow_dispatch:          # + кнопка "Run workflow" вручную в интерфейсе GitHub

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install openai feedparser requests

      - name: Run bot
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
          PIXAZO_API_KEY: ${{ secrets.PIXAZO_API_KEY }}
        run: python main.py

      # сохраняем seen_links.json обратно в репозиторий, чтобы не дублировать посты
      - name: Commit seen_links.json
        run: |
          git config --global user.name "news-bot"
          git config --global user.email "bot@users.noreply.github.com"
          git add seen_links.json
          git diff --staged --quiet || git commit -m "update seen links"
          git push